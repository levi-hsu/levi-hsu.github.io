---
layout: default
---
<div class="post-layout">

  <!-- Table of Contents sidebar -->
  <aside class="toc-sidebar" id="toc-sidebar">
    <div class="toc-inner">
      <h4>Contents</h4>
      <nav id="toc-nav"></nav>
    </div>
  </aside>

  <!-- Main article -->
  <article class="post-article">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="post-meta">
        <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
        {% if page.tags %}
        <span class="post-tags">
          {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
        </span>
        {% endif %}
        {% if page.bibtex %}
        <button class="btn-link bib-trigger" data-bib="{{ page.bibtex | escape }}">BIB</button>
        {% endif %}
      </div>
      {% if page.abstract %}
      <div class="post-abstract">
        <strong>Abstract.</strong> {{ page.abstract }}
      </div>
      {% endif %}
    </header>

    <div class="post-content" id="post-content">
      {{ content }}
    </div>
  </article>

</div>
